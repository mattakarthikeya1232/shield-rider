<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>

        /* ===== GLOBAL ===== */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* ===== CARD ===== */
        .card {
            background: rgba(255,255,255,0.04);
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            width: 350px;
            box-shadow: 0 0 30px rgba(255,215,0,0.15);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        /* ===== TITLE ===== */
        h2 {
            margin-bottom: 20px;
            color: gold;
            letter-spacing: 1px;
        }

        /* ===== INPUTS ===== */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #222;
            background: #111;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: gold;
            box-shadow: 0 0 8px rgba(255,215,0,0.4);
        }

        /* ===== BUTTON ===== */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px gold;
        }

        /* ===== LINK ===== */
        p {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        a {
            color: gold;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>New user? <a href="register.html">Register</a></p>

</div>

<script>
    function login() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;

        const saved = JSON.parse(localStorage.getItem("user"));

        if(saved && saved.email === email && saved.password === pass){
            localStorage.setItem("loggedIn", "true");
            window.location.href = "index.html";
        } else {
            alert("Invalid credentials");
        }
    }
</script>

</body>
</html>
